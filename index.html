<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NomNom Club 🍜</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px;}
.card { background:white; padding:20px; border-radius:12px; max-width:400px; margin:auto;}
.tag { display:inline-block; padding:8px 12px; margin:5px; border-radius:20px; background:#eee; cursor:pointer;}
.tag.selected { background:#07c160; color:white;}
.btn { margin-top:10px; padding:10px; width:100%; border:none; border-radius:8px;}
.btn-primary { background:#07c160; color:white;}
input { width:100%; padding:8px; margin-top:10px; }
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="card" id="page1">
<h2>NomNom Club 🍜</h2>

<input id="eventName" placeholder="Event name">
<input id="hostName" placeholder="Your name">
<input id="expectedPeople" placeholder="Number of people">

<button class="btn btn-primary" onclick="createEvent()">Create</button>
</div>

<!-- PAGE 2 -->
<div class="card" id="page2" style="display:none;">
<h3>Pick Time & Food</h3>

<div id="shareLink"></div>

<input id="userName" placeholder="Your name">

<h4>Time</h4>
<div id="timeTags"></div>

<h4>Food (max 3)</h4>
<div id="foodTags"></div>

<button class="btn btn-primary" onclick="submitAll()">Submit</button>
<button class="btn" onclick="loadResults()">View Progress</button>
</div>

<!-- PAGE 3 -->
<div class="card" id="page3" style="display:none;">
<h3>Final Decision</h3>
<div id="finalResult"></div>
</div>

<script>
const SUPABASE_URL = "https://bunzqgrdssupaeqznjwl.supabase.co";
const SUPABASE_KEY = "sb_publishable_你的key";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentEventId=null;
let expectedPeople=0;

const times=["Mon-Lunch","Mon-Dinner","Tue-Lunch","Tue-Dinner","Wed-Lunch","Wed-Dinner","Thu-Lunch","Thu-Dinner","Fri-Lunch","Fri-Dinner","Sat-Lunch","Sat-Dinner","Sun-Lunch","Sun-Dinner"];
const foods=["Chinese","Japanese","Korean","Italian","Thai","BBQ"];

function renderTags(){
document.getElementById("timeTags").innerHTML=
times.map(t=>`<span class="tag" onclick="toggle(this)">${t}</span>`).join("");

document.getElementById("foodTags").innerHTML=
foods.map(f=>`<span class="tag food" onclick="toggleFood(this)">${f}</span>`).join("");
}

function toggle(el){
el.classList.toggle("selected");
}

function toggleFood(el){
const selected=document.querySelectorAll(".food.selected");
if(!el.classList.contains("selected") && selected.length>=3){
alert("Max 3 foods");
return;
}
el.classList.toggle("selected");
}

async function createEvent(){
const name=document.getElementById("eventName").value;
const host=document.getElementById("hostName").value;
expectedPeople=parseInt(document.getElementById("expectedPeople").value);

if(!name || !host || !expectedPeople){
alert("Please fill all fields");
return;
}

const {data,error}=await client
  .from("events")
  .insert([{title:name, expected_people:expectedPeople}])
  .select();

if(error){
console.error(error);
alert("Create failed ❌ check console");
return;
}

currentEventId=data[0].id;

// 自动填入host名字
document.getElementById("userName").value = host;

document.getElementById("page1").style.display="none";
document.getElementById("page2").style.display="block";

document.getElementById("shareLink").innerHTML=
`Share 👉 ${location.origin}?event=${currentEventId}`;

renderTags();
}

async function submitAll(){
const user=document.getElementById("userName").value;

if(!user){
alert("Enter your name");
return;
}

const selectedTimes=[...document.querySelectorAll("#timeTags .selected")].map(t=>t.innerText);
const selectedFoods=[...document.querySelectorAll("#foodTags .selected")].map(t=>t.innerText);

await client.from("availability").delete().eq("event_id",currentEventId).eq("user_name",user);

await Promise.all(selectedTimes.map(t=>{
const [date,time]=t.split("-");
return client.from("availability").insert([{event_id:currentEventId,user_name:user,date,time_slot:time}]);
}));

await client.from("food_votes").delete().eq("event_id",currentEventId).eq("user_name",user);

await Promise.all(selectedFoods.map(f=>{
return client.from("food_votes").insert([{event_id:currentEventId,user_name:user,food:f}]);
}));

alert("Saved!");
}

async function loadResults(){

const {data:event}=await client.from("events").select("*").eq("id",currentEventId).single();
expectedPeople=event.expected_people;

const {data:avail}=await client.from("availability").select("*").eq("event_id",currentEventId);
const {data:food}=await client.from("food_votes").select("*").eq("event_id",currentEventId);

const users=[...new Set(avail.map(d=>d.user_name))];

if(users.length<expectedPeople){
alert(`Waiting for ${expectedPeople-users.length} more people`);
return;
}

const count={};
avail.forEach(d=>{
const key=d.date+"-"+d.time_slot;
count[key]=(count[key]||0)+1;
});

const finalTime=Object.entries(count).sort((a,b)=>b[1]-a[1])[0][0];

const foodCount={};
food.forEach(f=>{
foodCount[f.food]=(foodCount[f.food]||0)+1;
});

const finalFood=Object.entries(foodCount).sort((a,b)=>b[1]-a[1])[0][0];

document.getElementById("page2").style.display="none";
document.getElementById("page3").style.display="block";

document.getElementById("finalResult").innerHTML=
`📅 ${finalTime}<br>🍜 ${finalFood}`;
}

// 自动进入 event
const urlParams=new URLSearchParams(window.location.search);
if(urlParams.get("event")){
currentEventId=urlParams.get("event");
document.getElementById("page1").style.display="none";
document.getElementById("page2").style.display="block";
renderTags();
}
</script>

</body>
</html>
